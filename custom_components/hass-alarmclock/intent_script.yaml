# Add this to your configuration.yaml to enable LLM interaction
# The integration handles these natively, but you can override them here if needed.

intent_script:
  HassAlarmClockSet:
    action:
      service: alarm_clock.set_alarm
      data:
        entity_id: "switch.{{ name | replace(' ', '_') | lower }}_{{ name | replace(' ', '_') | lower }}"
        time: "{{ time }}"
        sound: "{{ sound | default('wekker.mp3') }}"
        repeat: "{{ repeat | default('none') }}"
    speech:
      text: "Vale, he puesto la alarma en {{ name }} para las {{ time }}."

  HassAlarmClockStop:
    action:
      service: alarm_clock.stop
      target:
        entity_id: "switch.{{ name | replace(' ', '_') | lower }}_{{ name | replace(' ', '_') | lower }}"
    speech:
      text: "Alarma detenida."

  HassAlarmClockSnooze:
    action:
      service: alarm_clock.snooze
      target:
        entity_id: "switch.{{ name | replace(' ', '_') | lower }}_{{ name | replace(' ', '_') | lower }}"
    speech:
      text: "Alarma pospuesta."
